<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư Viện Tiểu Thuyết Offline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <header>
        <h1>Lorebook</h1>
        <div class="header-buttons">
            <button id="btn-toggle-form" class="btn-success">➕ Đăng Truyện Mới</button>
            <button id="theme-toggle">Đổi Chế Độ Nền</button>
        </div>
    </header>

    <main class="container">
        <!-- FORM ĐĂNG TRUYỆN MỚI -->
        <section id="publish-form-section" class="publish-section hidden">
            <h2>Đăng tiểu thuyết mới</h2>
            <form id="publish-form">
                <div class="form-group">
                    <label for="novel-title">Tên tiểu thuyết:</label>
                    <input type="text" id="novel-title" required placeholder="Ví dụ: Thần Bí Phục Tô">
                </div>
                <div class="form-group">
                    <label for="novel-author">Tác giả:</label>
                    <input type="text" id="novel-author" required placeholder="Ví dụ: Phật Tiền Hiến Hoa">
                </div>
                <div class="form-group">
                    <label for="chapter-title-input">Tên Chương 1:</label>
                    <input type="text" id="chapter-title-input" required placeholder="Ví dụ: Chương 1: Đàn áp quỷ nhãn">
                </div>
                <div class="form-group">
                    <label for="chapter-content-input">Nội dung Chương 1 (Dùng dấu xuống dòng để chia đoạn):</label>
                    <textarea id="chapter-content-input" rows="8" required placeholder="Nhập nội dung truyện tại đây..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Xuất bản ngay</button>
                    <button type="button" id="btn-cancel-form" class="btn-secondary">Hủy</button>
                </div>
            </form>
        </section>

        <!-- DANH SÁCH TRUYỆN -->
        <h2>Danh sách truyện trong máy</h2>
        <div id="novel-list" class="novel-list">
            <!-- Truyện sẽ được tự động render bằng JS -->
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log("Service Worker hoạt động!"))
                .catch(err => console.log("Lỗi SW:", err));
        }
    </script>
</body>
</html>
