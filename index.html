<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Tiểu Thuyết Tự Động</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --text-color: #2b2b2b;
            --panel-bg: #ffffff;
            --border-color: #e0dacb;
        }
        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #cecece;
            --panel-bg: #1e1e1e;
            --border-color: #333333;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 20px;
            position: sticky; top: 0; z-index: 100;
        }
        .container { max-width: 700px; margin: 0 auto; padding: 20px; }
        .flex-space { display: flex; justify-content: space-between; align-items: center; }
        .btn {
            background-color: var(--panel-bg); color: var(--text-color);
            border: 1px solid var(--border-color); padding: 8px 15px;
            cursor: pointer; border-radius: 5px; font-family: sans-serif;
        }
        .btn-primary { background-color: #007bff; color: white; border: none; }
        
        /* Đọc truyện */
        .chapter-select { width: 100%; padding: 10px; margin: 20px 0; font-size: 1rem; background: var(--panel-bg); color: var(--text-color); border: 1px solid var(--border-color); }
        .novel-content h2 { font-size: 1.8rem; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .novel-content p { text-align: justify; text-indent: 30px; margin-bottom: 20px; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 40px; }

        /* Khung Admin Đăng Bài */
        .admin-panel {
            margin-top: 80px; padding: 20px; background-color: var(--panel-bg);
            border: 2px dashed #999; border-radius: 8px; font-family: sans-serif;
        }
        .admin-panel input, .admin-panel textarea {
            width: 100%; padding: 10px; margin: 8px 0;
            box-sizing: border-box; border: 1px solid var(--border-color);
            background: var(--bg-color); color: var(--text-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="container flex-space">
            <h1>Truyện Của Tôi</h1>
            <button class="btn" id="theme-toggle">Chế độ tối</button>
        </div>
    </header>

    <main class="container">
        <!-- Bộ đọc truyện -->
        <select id="chapter-dropdown" class="chapter-select"></select>
        
        <article class="novel-content">
            <h2 id="chapter-title">Đang tải dữ liệu...</h2>
            <div id="chapter-text"></div>
        </article>

        <div class="nav-buttons">
            <button class="btn" id="prev-btn">◀ Trước</button>
            <button class="btn" id="next-btn">Sau ▶</button>
        </div>

        <hr style="margin-top: 60px; border: 0; border-top: 1px solid var(--border-color);">

        <!-- KHU VỰC ĐĂNG TIỂU THUYẾT TRỰC TIẾP -->
        <section class="admin-panel">
            <h3>🔑 Khu Vực Đăng Chương Mới</h3>
            <p style="font-size: 0.85rem; color: gray;">Giao diện này giúp bạn lưu thẳng nội dung lên GitHub mà không cần mở code.</p>
            
            <input type="password" id="github-token" placeholder="Dán GitHub Personal Access Token vào đây...">
            <input type="text" id="new-id" placeholder="Mã chương (Ví dụ: chuong-3)">
            <input type="text" id="new-title" placeholder="Tiêu đề chương (Ví dụ: Chương 3: Lật Đổ)">
            <textarea id="new-content" rows="8" placeholder="Nhập nội dung truyện tại đây. Xuống dòng tự động tính là một đoạn văn mới..."></textarea>
            
            <button class="btn btn-primary" id="publish-btn">🚀 Đăng Chương Mới</button>
            <p id="status-msg" style="font-weight: bold; margin-top: 10px;"></p>
        </section>
    </main>

    <!-- NƠI LƯU TRỮ DỮ LIỆU TRUYỆN (Sẽ bị ghi đè tự động khi bạn bấm Đăng) -->
    <script id="novel-database">
        const novelData = {
  "chuong-1": {
    "title": "Chương 1: Khởi đầu mới",
    "content": [
      "Đây là dòng đầu tiên của chương một. Ánh bình minh lấp ló sau lũy tre làng.",
      "Nhân vật chính bước ra khỏi hiên nhà, sẵn sàng cho một hành trình mới."
    ]
  },
  "chuong-2": {
    "title": "Chương 2: Gặp gỡ định mệnh",
    "content": [
      "Thành phố sầm uất hiện ra trước mắt.",
      "Tại quán nước ven đường, một người lạ mặt đã đợi sẵn..."
    ]
  }
};
    </script>

    <!-- LOGIC VẬN HÀNH BỘ ĐỌC VÀ ĐĂNG BÀI -->
    <script>
        // Cấu hình GitHub của bạn (HÃY SỬA 2 DÒNG NÀY CHO ĐÚNG)
        const GH_USER = "Eriajiu"; 
        const GH_REPO = "Thư_viện"; 

        const keys = Object.keys(novelData);
        let currentIdx = 0;

        // Dom Elements đọc truyện
        const dropdown = document.getElementById('chapter-dropdown');
        const cTitle = document.getElementById('chapter-title');
        const cText = document.getElementById('chapter-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function init() {
            dropdown.innerHTML = "";
            keys.forEach(k => {
                let opt = document.createElement('option');
                opt.value = k; opt.innerText = novelData[k].title;
                dropdown.appendChild(opt);
            });
            render(keys[0]);
        }

        function render(key) {
            if(!novelData[key]) return;
            cTitle.innerText = novelData[key].title;
            cText.innerHTML = novelData[key].content.map(p => `<p>${p}</p>`).join('');
            dropdown.value = key;
            currentIdx = keys.indexOf(key);
            prevBtn.disabled = currentIdx === 0;
            nextBtn.disabled = currentIdx === keys.length - 1;
        }

        dropdown.addEventListener('change', (e) => render(e.target.value));
        prevBtn.addEventListener('click', () => render(keys[currentIdx - 1]));
        nextBtn.addEventListener('click', () => render(keys[currentIdx + 1]));
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });
        init();

        // --- XỬ LÝ ĐĂNG TRUYỆN TRỰC TIẾP LÊN GITHUB ---
        document.getElementById('publish-btn').addEventListener('click', async () => {
            const token = document.getElementById('github-token').value.trim();
            const id = document.getElementById('new-id').value.trim();
            const title = document.getElementById('new-title').value.trim();
            const text = document.getElementById('new-content').value.trim();
            const status = document.getElementById('status-msg');

            if (!token || !id || !title || !text) {
                status.innerText = "❌ Vui lòng điền đầy đủ tất cả các ô!";
                status.style.color = "red";
                return;
            }

            status.innerText = "⏳ Đang kết nối GitHub và xử lý dữ liệu...";
            status.style.color = "orange";

            try {
                // 1. Cập nhật dữ liệu tạm trong bộ nhớ
                const paragraphs = text.split('\n').map(p => p.trim()).filter(p => p.length > 0);
                novelData[id] = { title: title, content: paragraphs };

                // 2. Lấy nội dung file index.html hiện tại từ GitHub để lấy mã SHA (bắt buộc của GitHub API)
                const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/index.html`;
                const getRes = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });
                
                if (!getRes.ok) throw new Error("Không tìm thấy file hoặc Token sai!");
                const fileData = await getRes.json();
                const sha = fileData.sha;
                const oldContent = decodeURIComponent(escape(atob(fileData.content)));

                // 3. Thay thế khối dữ liệu cũ bằng khối dữ liệu mới trong chuỗi mã nguồn
                const regex = /<script id="novel-database">([\s\S]*?)<\/script>/;
                const newDataScript = `<script id="novel-database">\n        const novelData = ${JSON.stringify(novelData, null, 2)};\n    <\/script>`;
                const updatedHtml = oldContent.replace(regex, newDataScript);

                // 4. Đẩy file đã cập nhật ngược trở lại GitHub
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Đăng chương mới: ${title}`,
                        content: btoa(unescape(encodeURIComponent(updatedHtml))),
                        sha: sha
                    })
                });

                if (putRes.ok) {
                    status.innerText = "🎉 Đăng truyện thành công! GitHub đang cập nhật website (mất khoảng 1 phút).";
                    status.style.color = "green";
                    // Reset form
                    document.getElementById('new-id').value = "";
                    document.getElementById('new-title').value = "";
                    document.getElementById('new-content').value = "";
                } else {
                    throw new Error("Lỗi khi ghi đè file lên GitHub.");
                }

            } catch (err) {
                status.innerText = `❌ Thất bại: ${err.message}`;
                status.style.color = "red";
            }
        });
    </script>
</body>
</html>
